server:
  port: 8090

spring:
  application:
    name: purchase-repair-tool
  main:
    allow-bean-definition-overriding: true

# Snowflake connection (Okta SSO -- opens browser on first connect, then caches token)
snowflake:
  account: ${SNOWFLAKE_ACCOUNT:WXA20498.us-west-2.privatelink}
  user: ${SNOWFLAKE_USER:arnon.zamir@sunbit.com}
  warehouse: ${SNOWFLAKE_WAREHOUSE:DATA_ENG_WH}
  role: ${SNOWFLAKE_ROLE:DBT_DEV_ROLE}
  authenticator: externalbrowser
  # Set proxy-url to route Snowflake queries through a host-side proxy (for Docker SSO)
  # Run snowflake-proxy.py on the host, then set: SNOWFLAKE_PROXY_URL=http://host.docker.internal:8099
  proxy-url: ${SNOWFLAKE_PROXY_URL:}

# Admin API (purchase-service) per target environment
admin-api:
  timeout-seconds: 30
  targets:
    local:
      base-url: ${ADMIN_API_LOCAL_URL:http://localhost:8080}
    staging:
      base-url: ${ADMIN_API_STAGING_URL:https://purchase-service.staging.sunbit.com}
    prod:
      base-url: ${ADMIN_API_PROD_URL:https://purchase-service.prod.sunbit.com}

# MySQL targets for replication
mysql:
  local:
    host: sunbit-mysql
    port: 30306
    user: root
    password: root
    database: purchase
  staging:
    credentials-path: ${HOME}/.sunbit/mysql-staging.json

# Call center URLs (use {id} as placeholder for purchase ID)
call-center:
  prod: "https://call-center.prod.sunbit.com/?iss=https%3A%2F%2Fsunbit.okta.com#/purchases/show/{id}"
  staging: "https://call-center.staging.sunbit.com/?iss=https%3A%2F%2Fsunbit.okta.com#/purchases/show/{id}"
  local: "http://localhost:3020/#/purchases/show/{id}"

# Replication defaults per target environment.
# When customer-retailer-id and payment-profile-id are set, the replicator
# reuses existing records instead of inserting new ones (skips customers_retailers,
# customer_profiles, payment_profiles, card_payment_methods).
# Git-based sync for collaborative work (lists, statuses, notes, claims)
sync:
  enabled: ${SYNC_ENABLED:true}
  repo-url: ${SYNC_REPO_URL:git@github.com:sunbit-dev/account-management-service.git}
  local-path: ${SYNC_LOCAL_PATH:${HOME}/.sunbit/repair-sync}
  branch: ${SYNC_BRANCH:purchase-repair-sync}
  folder: ${SYNC_FOLDER:repair-sync}
  poll-interval-seconds: ${SYNC_POLL_INTERVAL:30}

replication:
  id-offset: 100000000
  local:
    retailer-id: 14                # local test retailer
  staging:
    retailer-id: 14                # staging retailer (update if different)
